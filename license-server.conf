# License Server Configuration for kejilion/apps
# Official: https://github.com/wlk199718/license-server
# 轻量级卡密验证服务端，支持多项目管理、设备绑定、心跳检测

local app_id="license-server"
local app_name="license-server"
local app_text="轻量级卡密验证服务，支持多项目、设备绑定、心跳检测、Web管理面板"
local app_url="https://github.com/wlk199718/license-server"
local docker_name="license-server"
local docker_port="${docker_port:-9000}"
local app_size="1"

docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}/data"
    cd "${app_dir}" || return 1

    # 生成随机管理员密钥
    local admin_key
    admin_key=$(openssl rand -hex 16)

    # 创建 docker-compose.yml
    cat <<EOF > docker-compose.yml
version: '3.8'

services:
  license-server:
    image: ghcr.io/wlk199718/license-server:latest
    container_name: ${docker_name}
    restart: always
    ports:
      - "${docker_port}:9000"
    volumes:
      - ./data:/app/data
    environment:
      - ADMIN_KEY=${admin_key}
      - DATABASE_URL=sqlite+aiosqlite:///./data/license.db
      - HEARTBEAT_TIMEOUT=120
      - HOST=0.0.0.0
      - PORT=9000
EOF

    # 保存密钥到本地文件方便查看
    echo "${admin_key}" > "${app_dir}/admin_key.txt"

    # 启动容器
    docker compose up -d

    echo "License Server 已部署完成！"
    check_docker_app_ip
    echo ""
    echo "管理面板：http://${server_ip}:${docker_port}"
    echo "管理密钥：${admin_key}"
    echo "密钥已保存至：${app_dir}/admin_key.txt"
    echo "数据目录：${app_dir}/data"
    echo ""
    echo "请妥善保管管理员密钥！"
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose pull
    docker compose up -d
    echo "License Server 已更新至最新版本。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "License Server 已彻底卸载，包括所有数据。"
}

