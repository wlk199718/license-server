# ACG-Faka Configuration for kejilion/apps
# Official: https://github.com/lizhipay/acg-faka
# 二次元发卡系统，支持多种支付渠道、分站、会员、推广返佣

local app_id="acg-faka"
local app_name="acg-faka"
local app_text="二次元发卡系统，支持多种支付、分站、会员、卡密销售"
local app_url="https://github.com/lizhipay/acg-faka"
local docker_name="acg-faka"
local docker_port="${docker_port:-8080}"
local app_size="2"

docker_app_install() {
    local app_dir="/home/docker/${app_name}"
    mkdir -p "${app_dir}/mysql" "${app_dir}/web" "${app_dir}/nginx"
    cd "${app_dir}" || return 1

    # 生成随机 MySQL 密码
    local db_pass
    db_pass=$(openssl rand -hex 12)

    # Nginx 配置（含伪静态）
    cat <<'NGINXEOF' > "${app_dir}/nginx/default.conf"
server {
    listen 80;
    server_name _;
    root /var/www/html;
    index index.php index.html;

    location / {
        if (!-e $request_filename) {
            rewrite ^(.*)$ /index.php?s=$1 last;
            break;
        }
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
NGINXEOF

    # docker-compose.yml
    cat <<EOF > docker-compose.yml
version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: ${docker_name}-nginx
    restart: always
    ports:
      - "${docker_port}:80"
    volumes:
      - ./web:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  php:
    image: php:8.2-fpm-alpine
    container_name: ${docker_name}-php
    restart: always
    volumes:
      - ./web:/var/www/html
    command: >
      sh -c "
        apk add --no-cache libpng-dev libjpeg-turbo-dev freetype-dev libzip-dev icu-dev oniguruma-dev &&
        docker-php-ext-configure gd --with-freetype --with-jpeg &&
        docker-php-ext-install pdo_mysql gd mbstring zip bcmath opcache intl &&
        php-fpm
      "
    depends_on:
      - mysql

  mysql:
    image: mysql:8.0
    container_name: ${docker_name}-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${db_pass}
      MYSQL_DATABASE: acg_faka
      MYSQL_USER: acg_faka
      MYSQL_PASSWORD: ${db_pass}
    volumes:
      - ./mysql:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
EOF

    # 下载源码
    echo "正在下载 ACG-Faka 源码..."
    curl -L -o /tmp/acg-faka.tar.gz "${gh_proxy}https://github.com/wlk199718/acg-faka/archive/refs/heads/main.tar.gz"
    tar -xzf /tmp/acg-faka.tar.gz -C "${app_dir}/web" --strip-components=1
    rm -f /tmp/acg-faka.tar.gz

    # 设置权限
    chmod -R 777 "${app_dir}/web/config"
    chmod -R 777 "${app_dir}/web/assets"
    chmod -R 777 "${app_dir}/web/vendor" 2>/dev/null

    # 保存数据库密码
    cat <<EOF > "${app_dir}/db_info.txt"
MySQL 数据库信息：
  主机: mysql
  端口: 3306
  数据库: acg_faka
  用户名: acg_faka
  密码: ${db_pass}
  Root密码: ${db_pass}
EOF

    # 启动
    docker compose up -d

    # 等待 MySQL 就绪
    echo "等待 MySQL 启动..."
    sleep 15

    echo ""
    echo "ACG-Faka 已部署完成！"
    check_docker_app_ip
    echo ""
    echo "首次访问将进入安装向导，数据库信息如下："
    echo "  数据库主机: mysql"
    echo "  数据库端口: 3306"
    echo "  数据库名称: acg_faka"
    echo "  数据库用户: acg_faka"
    echo "  数据库密码: ${db_pass}"
    echo ""
    echo "数据库信息已保存至: ${app_dir}/db_info.txt"
    echo "安装完成后，后台地址: http://\${server_ip}:${docker_port}/admin"
}

docker_app_update() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1

    # 备份配置
    cp -r "${app_dir}/web/config" "${app_dir}/config_backup" 2>/dev/null

    # 下载最新源码
    curl -L -o /tmp/acg-faka.tar.gz "${gh_proxy}https://github.com/wlk199718/acg-faka/archive/refs/heads/main.tar.gz"
    tar -xzf /tmp/acg-faka.tar.gz -C "${app_dir}/web" --strip-components=1
    rm -f /tmp/acg-faka.tar.gz

    # 恢复配置
    cp -r "${app_dir}/config_backup/"* "${app_dir}/web/config/" 2>/dev/null
    rm -rf "${app_dir}/config_backup"

    chmod -R 777 "${app_dir}/web/config"
    chmod -R 777 "${app_dir}/web/assets"

    docker compose restart
    echo "ACG-Faka 已更新至最新版本。"
}

docker_app_uninstall() {
    local app_dir="/home/docker/${app_name}"
    cd "${app_dir}" || return 1
    docker compose down --rmi all
    rm -rf "${app_dir}"
    echo "ACG-Faka 已彻底卸载，包括所有数据。"
}

# 注册到平台
docker_app_plus
